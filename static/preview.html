<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Shape Morph Previewer</title>
    <style>
        :root {
            --bg: #111;
            --panel: #1a1a1a;
            --accent: #2563eb;
            --border: #333;
        }

        body {
            background: var(--bg);
            color: #eee;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            /* Prevent body scroll */
        }

        /* --- SIDEBAR CONTROLS --- */
        .sidebar {
            width: 280px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            flex-shrink: 0;
        }

        .nav-link {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            margin-bottom: 20px;
            display: block;
        }

        .nav-link:hover {
            color: #fff;
        }

        h3 {
            margin-top: 0;
            font-size: 18px;
            color: #fff;
        }

        .input-group {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="file"] {
            background: #222;
            border: 1px solid var(--border);
            padding: 8px;
            border-radius: 4px;
            width: calc(100% - 18px);
            font-size: 11px;
            color: #ccc;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* --- LARGE PREVIEW AREA --- */
        .preview-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
        }

        .gif-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #gifOut {
            max-width: 90%;
            max-height: 80vh;
            /* Scaled to your screen height */
            border: 2px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: none;
            /* Hidden until first gen */
            background: #000;
        }

        .placeholder {
            color: #444;
            font-size: 14px;
            border: 2px dashed #333;
            padding: 100px;
            border-radius: 12px;
            text-align: center;
        }

        .download-wrap {
            margin-top: 20px;
            width: 200px;
        }

        #statusText {
            margin-top: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <a href="/" class="nav-link">← Shape Editor</a>
        <h3>Morph Test</h3>

        <div class="input-group">
            <label>Shape A (Start)</label>
            <input type="file" id="fileA" accept=".json">
        </div>

        <div class="input-group">
            <label>Shape B (End)</label>
            <input type="file" id="fileB" accept=".json">
        </div>

        <button id="genBtn" onclick="generate()">Generate Morph</button>
        <div id="statusText">Ready</div>

        <div id="dlArea" style="display: none; margin-top: auto;">
            <a id="dlLink" download="morph.gif" style="text-decoration: none;">
                <button style="background:#059669">💾 Download GIF</button>
            </a>
        </div>
    </div>

    <div class="preview-area">
        <div class="gif-container">
            <div id="placeholder" class="placeholder">
                Select JSON files to preview the morph
            </div>
            <img id="gifOut" src="" alt="Morphing GIF">
        </div>
    </div>

    <script>
        async function generate() {
            const fA = document.getElementById('fileA').files[0];
            const fB = document.getElementById('fileB').files[0];
            if (!fA || !fB) return alert("Select two JSON files!");

            const btn = document.getElementById('genBtn');
            const status = document.getElementById('statusText');
            const placeholder = document.getElementById('placeholder');
            const gif = document.getElementById('gifOut');
            const dlArea = document.getElementById('dlArea');

            btn.disabled = true;
            status.innerText = "⚡ FFT Processing...";

            const fd = new FormData();
            fd.append('fileA', fA);
            fd.append('fileB', fB);

            try {
                const resp = await fetch('/api/generate-morph', { method: 'POST', body: fd });
                if (!resp.ok) throw new Error("Server error");

                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);

                placeholder.style.display = 'none';
                gif.style.display = 'block';
                gif.src = url;

                document.getElementById('dlLink').href = url;
                dlArea.style.display = 'block';
                status.innerText = "✅ Ready";
            } catch (e) {
                status.innerText = "❌ Error";
                alert("Generation failed. Check server logs.");
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
